<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Submit Workout</title>
<style>
  :root {
    --fg: #1a1a1a;
    --muted: #6b6b6b;
    --line: #d9d9d9;
    --bg: #ffffff;
    --accent: #1f6feb;
    --skip: #f3f3f3;
    --tap: 56px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font: 17px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .wrap {
    max-width: 640px; margin: 0 auto;
    padding: 16px 16px calc(120px + env(safe-area-inset-bottom));
  }
  h1 { font-size: 20px; margin: 8px 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 16px; }

  /* Day picker */
  .days { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
  .day-btn {
    display: block; width: 100%; min-height: var(--tap);
    text-align: left; padding: 14px 16px;
    border: 1px solid var(--line); border-radius: 12px;
    background: #fff; color: var(--fg); font-size: 17px;
  }
  .day-btn .d-id { font-weight: 600; }
  .day-btn .d-meta { color: var(--muted); font-size: 14px; display: block; margin-top: 2px; }
  .day-btn.today { border-color: var(--accent); border-width: 2px; }
  .badge {
    display: inline-block; font-size: 12px; font-weight: 600;
    color: var(--accent); margin-left: 8px;
  }

  /* Exercise rows */
  .row {
    display: flex; align-items: center; gap: 12px;
    min-height: var(--tap); padding: 10px 4px;
    border-bottom: 1px solid var(--line);
  }
  .row.done { background: #f0f7ff; }
  .cb {
    flex: 0 0 auto; width: 30px; height: 30px;
    appearance: none; -webkit-appearance: none;
    border: 2px solid var(--muted); border-radius: 7px;
    background: #fff; position: relative;
  }
  .cb:checked { background: var(--accent); border-color: var(--accent); }
  .cb:checked::after {
    content: ""; position: absolute; left: 9px; top: 4px;
    width: 7px; height: 14px; border: solid #fff;
    border-width: 0 3px 3px 0; transform: rotate(45deg);
  }
  .ex { flex: 1 1 auto; min-width: 0; }
  .ex .nm { font-weight: 500; }
  .ex .meta { color: var(--muted); font-size: 14px; margin-top: 2px; }
  .wt {
    flex: 0 0 auto; min-width: 78px; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .wt input {
    width: 84px; min-height: 44px; text-align: right;
    font-size: 17px; padding: 4px 8px;
    border: 1px solid var(--line); border-radius: 8px;
    background: #fff; color: var(--fg);
  }
  .wt input.changed { border-color: var(--accent); color: var(--accent); font-weight: 600; }

  /* Note */
  .note-wrap { margin: 18px 0 8px; }
  .note-wrap label { display: block; font-size: 14px; color: var(--muted); margin-bottom: 6px; }
  textarea {
    width: 100%; min-height: 72px; resize: vertical;
    font: inherit; padding: 10px 12px;
    border: 1px solid var(--line); border-radius: 10px; background: #fff; color: var(--fg);
  }

  /* Walk/Run logger */
  .wr-card { border-style: dashed; }
  .wr-grid { display: flex; flex-direction: column; gap: 14px; margin: 8px 0; }
  .wr-grid label { display: block; font-size: 14px; color: var(--muted); }
  .wr-grid input {
    display: block; width: 100%; min-height: 48px; margin-top: 6px;
    font-size: 17px; padding: 8px 12px;
    border: 1px solid var(--line); border-radius: 10px; background: #fff; color: var(--fg);
  }
  .wr-summary {
    margin: 6px 0 4px; padding: 12px 14px;
    background: #f0f7ff; border-radius: 10px;
    font-size: 14px; line-height: 1.5; color: var(--fg);
  }
  .wr-summary.empty { color: var(--muted); background: var(--skip); }

  /* Sticky action bar */
  .bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.96);
    border-top: 1px solid var(--line);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: flex; gap: 10px;
    backdrop-filter: saturate(180%) blur(8px);
  }
  .btn {
    flex: 1 1 auto; min-height: var(--tap);
    border-radius: 12px; font-size: 17px; font-weight: 600;
    border: 1px solid var(--line); background: #fff; color: var(--fg);
  }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; flex: 2 1 auto; }
  .btn:active { opacity: 0.8; }

  .back { display: inline-block; margin-bottom: 12px; color: var(--accent); font-size: 15px; background: none; border: none; padding: 6px 0; }
  .hidden { display: none !important; }
  .err { color: #b00020; font-size: 14px; margin: 12px 0; }
  .toast {
    position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%);
    background: #1a1a1a; color: #fff; padding: 10px 16px; border-radius: 10px;
    font-size: 15px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 10;
    max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }

  /* Floating refresh button (always available, even as a home-screen app) */
  .refresh {
    position: fixed; top: calc(env(safe-area-inset-top) + 8px); right: 12px; z-index: 15;
    width: 42px; height: 42px; border-radius: 50%;
    border: 1px solid var(--line); background: rgba(255,255,255,0.96); color: var(--accent);
    font-size: 22px; line-height: 1; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 5px rgba(0,0,0,0.12); -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
  }
  .refresh:active { opacity: 0.6; }

  /* How-to guide link */
  .howto {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 6px; padding: 4px 0;
    color: var(--accent); font-size: 14px; font-weight: 500;
    background: none; border: none; cursor: pointer;
  }
  .howto .play {
    flex: 0 0 auto; width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); color: #fff; font-size: 9px;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* Bottom-sheet popup */
  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 20;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 21;
    background: #fff; border-radius: 18px 18px 0 0;
    max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    transform: translateY(100%); transition: transform .25s ease;
    padding: 0 16px calc(24px + env(safe-area-inset-bottom));
  }
  .sheet.open { transform: translateY(0); }
  .sheet-head {
    position: sticky; top: 0; background: #fff; z-index: 1;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 16px 0 10px; border-bottom: 1px solid var(--line);
  }
  .sheet-head h2 { font-size: 18px; margin: 0; }
  .sheet-close {
    flex: 0 0 auto; width: 36px; height: 36px; border-radius: 50%;
    border: none; background: var(--skip); color: var(--fg); font-size: 22px; line-height: 1;
  }
  .video-box {
    position: relative; width: 100%; padding-top: 56.25%;
    margin: 16px 0 4px; border-radius: 12px; overflow: hidden; background: #000;
  }
  .video-box iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .sec-title { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 22px 0 8px; }
  .bodymap { display: block; width: 100%; max-height: 320px; margin: 0 auto; }
  .legend { display: flex; gap: 18px; justify-content: center; font-size: 13px; color: var(--muted); margin-top: 8px; }
  .legend i { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 6px; vertical-align: -1px; }
  .cues { margin: 0; padding-left: 22px; }
  .cues li { margin: 9px 0; }
  .src { font-size: 12px; color: var(--muted); margin-top: 18px; }
</style>
</head>
<body>
<button class="refresh" id="refresh" aria-label="Refresh page" title="Refresh">&#8635;</button>
<div class="wrap">

  <!-- DAY PICKER VIEW -->
  <section id="picker">
    <h1>Submit Workout</h1>
    <p class="sub" id="picker-sub">Pick a workout.</p>
    <div class="days" id="days"></div>
    <p class="err hidden" id="picker-err"></p>
  </section>

  <!-- WORKOUT VIEW -->
  <section id="workout" class="hidden">
    <button class="back" id="back">&larr; Change day</button>
    <h1 id="w-title">Workout</h1>
    <p class="sub" id="w-sub"></p>
    <div id="rows"></div>
    <div class="note-wrap">
      <label for="note">Session note (optional)</label>
      <textarea id="note" placeholder="e.g. left knee tight, dropped to 3x6"></textarea>
    </div>
  </section>

  <!-- WALK / RUN VIEW -->
  <section id="walkrun" class="hidden">
    <button class="back" id="wr-back">&larr; Change day</button>
    <h1>Walk / Run</h1>
    <p class="sub">Interval session — first interval walk, then alternating.</p>
    <div class="wr-grid">
      <label>Walk pace<input id="wr-walk-pace" type="text" autocapitalize="off" autocomplete="off" placeholder="e.g. 18:00 /mi or 3.2 mph"></label>
      <label>Walk distance per interval<input id="wr-walk-dist" type="text" inputmode="decimal" autocomplete="off" placeholder="e.g. 0.10 (mi)"></label>
      <label>Run pace<input id="wr-run-pace" type="text" autocapitalize="off" autocomplete="off" placeholder="e.g. 9:30 /mi or 6.0 mph"></label>
      <label>Run distance per interval<input id="wr-run-dist" type="text" inputmode="decimal" autocomplete="off" placeholder="e.g. 0.15 (mi)"></label>
      <label>Number of intervals (total)<input id="wr-intervals" type="text" inputmode="numeric" autocomplete="off" placeholder="e.g. 10"></label>
    </div>
    <div class="wr-summary empty" id="wr-summary">Enter distances + interval count to see totals.</div>
    <div class="note-wrap">
      <label for="wr-addl">Additional exercises</label>
      <textarea id="wr-addl" placeholder="e.g. push-ups 3x20, stretching"></textarea>
    </div>
  </section>
</div>

<!-- STICKY BAR (only in workout view) -->
<div class="bar hidden" id="bar">
  <button class="btn" id="copy">Copy payload</button>
  <button class="btn primary" id="submit">Submit</button>
</div>

<div class="toast" id="toast"></div>

<!-- EXERCISE GUIDE POPUP -->
<div class="sheet-backdrop" id="sheet-backdrop"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
  <div class="sheet-head">
    <h2 id="sheet-title">Exercise</h2>
    <button class="sheet-close" id="sheet-close" aria-label="Close">&times;</button>
  </div>
  <div id="sheet-body"></div>
</div>

<script src="bodymap.js"></script>
<script>
// ---- CONFIG -----------------------------------------------------------------
// The tiny Apple Shortcut that receives the payload and saves it to Dropbox.
// Must match the shortcut name EXACTLY (see SaveWorkout-shortcut-recipe.md).
const SHORTCUT_NAME = "SaveWorkout";
// Transport shape to the shortcut (keep in sync with SaveWorkout-shortcut-recipe.md):
//   LINE 1            = the target filename
//   LINE 2 .. end     = the payload body, verbatim
// The shortcut splits on New Lines, takes line 1 as the filename, and re-joins
// lines 2..end (with New Lines) as the file body. No sentinel, no newline artifacts.
// -----------------------------------------------------------------------------

let DATA = null;
let current = null; // the selected workout object
let mode = "workout"; // "workout" | "walkrun" — which view the action bar submits
let GUIDES = {};    // normalized-name -> guide card (from exercise-guides.json)

const $ = (id) => document.getElementById(id);

// Look up an exercise guide by its name (case/space-insensitive).
const normName = (s) => String(s).toLowerCase().trim().replace(/\s+/g, " ");

// Resolve a checklist line's exercise name to a guide card.
// Ben ruling 2026-07-10: every workout line shows its video every time, even for
// exercises done before — so matching must survive name variants ("Standing DB curl",
// "Farmer carry walk", "One-arm DB row (per side)"). Order: exact match → match with
// parenthetical qualifiers stripped → longest card key/alias contained in the name
// as a whole-word phrase.
function findGuide(name) {
  const n = normName(name);
  if (GUIDES[n]) return GUIDES[n];
  const stripped = normName(n.replace(/\([^)]*\)/g, " "));
  if (GUIDES[stripped]) return GUIDES[stripped];
  let best = null, bestLen = 0;
  for (const k in GUIDES) {
    if (k.length > bestLen && (" " + stripped + " ").includes(" " + k + " ")) {
      best = GUIDES[k]; bestLen = k.length;
    }
  }
  return best;
}

function todayLocalISODate() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}

// local ISO datetime: yyyy-MM-ddTHH:mm:ss  (NO timezone suffix, NO UTC shift)
function completedAtLocal() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}` +
         `T${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

// filename stamp: yyyy-MM-dd-HHmm  (local)
function stampLocal() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;
}

async function load() {
  try {
    const res = await fetch("workouts.json", { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    DATA = await res.json();
  } catch (e) {
    $("picker-err").textContent = "Could not load workouts.json — " + e.message;
    $("picker-err").classList.remove("hidden");
    return;
  }
  // Exercise guides are optional: if this fails, the page works exactly as before,
  // just without the "how-to" links.
  try {
    const gres = await fetch("exercise-guides.json", { cache: "no-store" });
    if (gres.ok) {
      const raw = (await gres.json()).guides || {};
      GUIDES = {};
      for (const k in raw) {
        GUIDES[normName(k)] = raw[k];
        for (const a of raw[k].aliases || []) GUIDES[normName(a)] = raw[k];
      }
    }
  } catch (e) { /* guides unavailable — non-fatal */ }
  renderPicker();
}

function renderPicker() {
  const days = $("days");
  days.innerHTML = "";
  const list = (DATA.workouts || []);
  if (list.length === 0) {
    $("picker-sub").textContent = "No workouts queued.";
    return;
  }
  const today = todayLocalISODate();
  $("picker-sub").textContent = list.length === 1 ? "1 workout queued." : list.length + " workouts queued.";
  list.forEach((w, i) => {
    const b = document.createElement("button");
    b.className = "day-btn" + (w.workout_date === today ? " today" : "");
    const isToday = w.workout_date === today;
    b.innerHTML =
      `<span class="d-id">${escapeHtml(w.title || w.workout_id)}${isToday ? '<span class="badge">TODAY</span>' : ''}</span>` +
      `<span class="d-meta">${w.lines.length} exercises &middot; ${escapeHtml(w.workout_date)}</span>`;
    b.addEventListener("click", () => openWorkout(i));
    days.appendChild(b);
  });
  // Always-available cardio logger, below the scheduled strength days.
  const wr = document.createElement("button");
  wr.className = "day-btn wr-card";
  wr.innerHTML =
    `<span class="d-id">Walk / Run</span>` +
    `<span class="d-meta">Log an interval cardio session</span>`;
  wr.addEventListener("click", openWalkRun);
  days.appendChild(wr);
  // If exactly one matches today, open it straight away.
  const todays = list.filter((w) => w.workout_date === today);
  if (todays.length === 1) openWorkout(list.indexOf(todays[0]));
}

function openWorkout(idx) {
  current = DATA.workouts[idx];
  $("picker").classList.add("hidden");
  $("workout").classList.remove("hidden");
  $("bar").classList.remove("hidden");
  mode = "workout";
  $("w-title").textContent = current.title || current.workout_id;
  $("w-sub").textContent = current.lines.length + " exercises · check off what you complete";
  $("note").value = "";

  const rows = $("rows");
  rows.innerHTML = "";
  current.lines.forEach((ln, i) => {
    const row = document.createElement("div");
    row.className = "row";
    row.dataset.i = i;

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.className = "cb";
    cb.checked = false;
    cb.addEventListener("change", () => {
      row.classList.toggle("done", cb.checked);
    });

    const ex = document.createElement("div");
    ex.className = "ex";
    ex.innerHTML = `<div class="nm">${escapeHtml(ln.name)}</div>` +
                   `<div class="meta">${escapeHtml(ln.setsreps)}</div>`;

    // If this exercise has a guide card, add a tappable "how-to" link under it.
    const guide = findGuide(ln.name);
    if (guide) {
      const link = document.createElement("button");
      link.className = "howto";
      link.type = "button";
      link.innerHTML = `<span class="play">&#9654;</span> Muscles &amp; how-to`;
      // Don't let tapping the link toggle the row's checkbox.
      link.addEventListener("click", (e) => { e.stopPropagation(); openGuide(guide); });
      ex.appendChild(link);
    }

    const wt = document.createElement("div");
    wt.className = "wt";
    const inp = document.createElement("input");
    inp.type = "text";
    inp.value = ln.weight;
    inp.setAttribute("inputmode", "text");
    inp.setAttribute("autocapitalize", "off");
    inp.setAttribute("autocomplete", "off");
    inp.dataset.orig = ln.weight;
    inp.addEventListener("input", () => {
      inp.classList.toggle("changed", inp.value.trim() !== inp.dataset.orig);
    });
    wt.appendChild(inp);

    // tapping anywhere on the label area toggles the checkbox (big target),
    // but NOT when tapping the weight field.
    ex.addEventListener("click", () => { cb.checked = !cb.checked; cb.dispatchEvent(new Event("change")); });

    row.appendChild(cb);
    row.appendChild(ex);
    row.appendChild(wt);
    rows.appendChild(row);
  });
}

function backToPicker() {
  $("workout").classList.add("hidden");
  $("walkrun").classList.add("hidden");
  $("bar").classList.add("hidden");
  $("picker").classList.remove("hidden");
  current = null;
  mode = "workout";
}

// ---- WALK / RUN -------------------------------------------------------------

const r2 = (x) => Math.round(x * 100) / 100;

function openWalkRun() {
  mode = "walkrun";
  $("picker").classList.add("hidden");
  $("walkrun").classList.remove("hidden");
  $("bar").classList.remove("hidden");
  ["wr-walk-pace", "wr-walk-dist", "wr-run-pace", "wr-run-dist", "wr-intervals", "wr-addl"]
    .forEach((id) => { $(id).value = ""; });
  updateWRSummary();
}

// Walk-first alternating: interval 1 walk, 2 run, 3 walk, ...
// => walks = ceil(N/2), runs = floor(N/2).
function walkRunCounts(N) {
  return { walk: Math.ceil(N / 2), run: Math.floor(N / 2) };
}

function updateWRSummary() {
  const el = $("wr-summary");
  const N = parseInt($("wr-intervals").value, 10);
  const wd = parseFloat($("wr-walk-dist").value);
  const rd = parseFloat($("wr-run-dist").value);
  if (!Number.isFinite(N) || N <= 0) {
    el.className = "wr-summary empty";
    el.textContent = "Enter distances + interval count to see totals.";
    return;
  }
  const c = walkRunCounts(N);
  const parts = [`${N} intervals → ${c.walk} walk + ${c.run} run`];
  if (Number.isFinite(wd) || Number.isFinite(rd)) {
    const tw = Number.isFinite(wd) ? r2(c.walk * wd) : null;
    const tr = Number.isFinite(rd) ? r2(c.run * rd) : null;
    const dparts = [];
    if (tw !== null) dparts.push(`${tw} mi walk`);
    if (tr !== null) dparts.push(`${tr} mi run`);
    let line = dparts.join(" + ");
    if (tw !== null && tr !== null) line += ` = ${r2(tw + tr)} mi total`;
    if (line) parts.push(line);
  }
  el.className = "wr-summary";
  el.innerHTML = parts.map(escapeHtml).join("<br>");
}

function buildWalkRunPayload() {
  const v = (id) => $(id).value.trim();
  const wp = v("wr-walk-pace"), wd = v("wr-walk-dist");
  const rp = v("wr-run-pace"), rd = v("wr-run-dist");
  const n = v("wr-intervals"), addl = v("wr-addl");
  const N = parseInt(n, 10);
  const c = Number.isFinite(N) ? walkRunCounts(N) : { walk: "", run: "" };
  const wdNum = parseFloat(wd), rdNum = parseFloat(rd);
  const totalWalk = (Number.isFinite(N) && Number.isFinite(wdNum)) ? r2(c.walk * wdNum) : "";
  const totalRun = (Number.isFinite(N) && Number.isFinite(rdNum)) ? r2(c.run * rdNum) : "";
  const totalDist = (totalWalk !== "" && totalRun !== "") ? r2(totalWalk + totalRun) : "";

  const fm =
    "---\n" +
    "type: walkrun\n" +
    `logged_at: ${completedAtLocal()}\n` +
    "pattern: walk-first-alternating\n" +
    "---\n";

  const lines = [
    `walk_pace: ${wp}`,
    `walk_distance_per_interval: ${wd}`,
    `run_pace: ${rp}`,
    `run_distance_per_interval: ${rd}`,
    `intervals_total: ${n}`,
    `walk_intervals: ${c.walk}`,
    `run_intervals: ${c.run}`,
    `total_walk_distance: ${totalWalk}`,
    `total_run_distance: ${totalRun}`,
    `total_distance: ${totalDist}`,
    `additional_exercises: ${addl || "none"}`,
  ];
  return fm + lines.join("\n") + "\n";
}

function walkrunFilename() {
  return `${stampLocal()}-walkrun-result.md`;
}

// Assemble the payload EXACTLY per result-payload-template.md
function buildPayload() {
  const lines = [];
  const rows = $("rows").querySelectorAll(".row");
  rows.forEach((row) => {
    const i = parseInt(row.dataset.i, 10);
    const ln = current.lines[i];
    const done = row.querySelector(".cb").checked;
    const inp = row.querySelector(".wt input");
    const performed = inp.value.trim();
    // Rebuild the line body. If the weight was edited, swap the 3rd pipe field;
    // otherwise emit the raw line verbatim.
    let body;
    if (performed !== "" && performed !== ln.weight) {
      body = `${ln.name} | ${ln.setsreps} | ${performed}`;
    } else {
      body = ln.raw;
    }
    lines.push(`- [${done ? "x" : " "}] ${body}`);
  });

  const fm =
    "---\n" +
    `workout_id: ${current.workout_id}\n` +
    `completed_at: ${completedAtLocal()}\n` +
    "---\n";

  let body = fm + lines.join("\n");

  const note = $("note").value.trim();
  if (note !== "") {
    body += `\n\nnote: ${note}`;
  }
  body += "\n"; // trailing newline, matches a normal text file
  return body;
}

function filename() {
  return `${stampLocal()}-workout-result-${current.slug}.md`;
}

// Fire the SaveWorkout shortcut: line 1 = filename, lines 2..end = body.
function fireShortcut(fname, payload) {
  const input = fname + "\n" + payload;
  const url = "shortcuts://x-callback-url/run-shortcut" +
              "?name=" + encodeURIComponent(SHORTCUT_NAME) +
              "&input=text" +
              "&text=" + encodeURIComponent(input);
  // Navigate to fire the shortcut.
  window.location.href = url;
}

function submit() {
  if (mode === "walkrun") {
    fireShortcut(walkrunFilename(), buildWalkRunPayload());
    return;
  }
  fireShortcut(filename(), buildPayload());
}

async function copyPayload() {
  const payload = mode === "walkrun" ? buildWalkRunPayload() : buildPayload();
  try {
    await navigator.clipboard.writeText(payload);
    toast("Payload copied. Paste into Drafts → Team Inbox if offline.");
  } catch (e) {
    // Fallback: select into a temp textarea.
    const ta = document.createElement("textarea");
    ta.value = payload;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); toast("Payload copied."); }
    catch (_) { toast("Copy failed — long-press to select manually."); }
    document.body.removeChild(ta);
  }
}

let toastTimer = null;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 3200);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ---- EXERCISE GUIDE POPUP ---------------------------------------------------

// Build the front+back muscle map SVG, highlighting primary/secondary muscles.
function muscleSVG(primary, secondary) {
  const BM = window.BODY_MAP;
  if (!BM) return "";
  const prim = new Set(primary || []);
  const sec = new Set(secondary || []);
  let fills = "";
  for (const slug in BM.muscles) {
    let fill = "#e9e9ec";                 // resting muscle
    if (prim.has(slug)) fill = "#1f6feb"; // primary (accent)
    else if (sec.has(slug)) fill = "#9ec1f5"; // secondary (light accent)
    for (const d of BM.muscles[slug]) fills += `<path d="${d}" fill="${fill}"/>`;
  }
  const outline =
    `<path d="${BM.outlineFront}" fill="none" stroke="#c4c4c8" stroke-width="2" vector-effect="non-scaling-stroke"/>` +
    `<path d="${BM.outlineBack}" fill="none" stroke="#c4c4c8" stroke-width="2" vector-effect="non-scaling-stroke"/>`;
  return `<svg class="bodymap" viewBox="${BM.viewBox}" xmlns="http://www.w3.org/2000/svg" ` +
         `role="img" aria-label="Muscles worked (front and back view)">${fills}${outline}</svg>`;
}

function openGuide(g) {
  $("sheet-title").textContent = g.name;
  const cues = (g.cues || []).map((c) => `<li>${escapeHtml(c)}</li>`).join("");
  const vid = g.video && g.video.youtube
    ? `<div class="video-box"><iframe
         src="https://www.youtube-nocookie.com/embed/${encodeURIComponent(g.video.youtube)}?rel=0&modestbranding=1&playsinline=1"
         title="${escapeHtml(g.name)} form video"
         allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
         allowfullscreen></iframe></div>`
    : "";
  $("sheet-body").innerHTML =
    vid +
    `<div class="sec-title">Muscles worked</div>` +
    muscleSVG(g.primary, g.secondary) +
    `<div class="legend"><span><i style="background:#1f6feb"></i>Primary</span>` +
    `<span><i style="background:#9ec1f5"></i>Supporting</span></div>` +
    `<div class="sec-title">How to do it</div>` +
    `<ol class="cues">${cues}</ol>` +
    (g.source ? `<p class="src">Form video: ${escapeHtml(g.source)}. Muscle map adapted from react-native-body-highlighter (MIT).</p>` : "");
  $("sheet").scrollTop = 0;
  $("sheet-backdrop").classList.add("open");
  $("sheet").classList.add("open");
}

function closeSheet() {
  $("sheet").classList.remove("open");
  $("sheet-backdrop").classList.remove("open");
  // Clear the iframe so the video stops playing when closed.
  $("sheet-body").innerHTML = "";
}

$("sheet-close").addEventListener("click", closeSheet);
$("sheet-backdrop").addEventListener("click", closeSheet);

// Refresh button: force a fresh load that bypasses any cached copy of the page,
// so updates always show even when launched as a home-screen app.
$("refresh").addEventListener("click", () => {
  const base = location.href.split("?")[0];
  location.replace(base + "?r=" + Date.now());
});

$("back").addEventListener("click", backToPicker);
$("submit").addEventListener("click", submit);
$("copy").addEventListener("click", copyPayload);

$("wr-back").addEventListener("click", backToPicker);
["wr-walk-dist", "wr-run-dist", "wr-intervals"].forEach((id) =>
  $(id).addEventListener("input", updateWRSummary));

load();
</script>
</body>
